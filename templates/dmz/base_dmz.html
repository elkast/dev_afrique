{% extends 'base.html' %}
{% block footer %}{% endblock %}

{% block contenu %}
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-titre">🛡️ DMZ — Sécurité</div>
        <a href="{% url 'dmz_tableau' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'dmz_tableau' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
            Tableau de bord
        </a>
        <a href="{% url 'dmz_journal' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'dmz_journal' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            Journal sécurité
        </a>
        <a href="{% url 'dmz_ips_bloquees' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'dmz_ips_bloquees' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg>
            IPs bloquées
        </a>
        <a href="{% url 'dmz_tentatives' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'dmz_tentatives' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Tentatives connexion
        </a>
        <a href="{% url 'dmz_tentatives_admin' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'dmz_tentatives_admin' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
            Tentatives admin
        </a>
        <div style="padding: var(--espace-lg); border-top: 1px solid var(--fond-sombre-border); margin-top: var(--espace-lg);">
            <a href="{% url 'tableau_de_bord' %}" class="btn btn-sm btn-outline-light" style="width: 100%; justify-content: center;">← Admin</a>
        </div>
    </aside>
    <div class="admin-contenu">
        {% block contenu_dmz %}{% endblock %}
    </div>
</div>
{% endblock %}
