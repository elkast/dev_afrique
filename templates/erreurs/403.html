{% extends 'base.html' %}
{% block titre %}403 — Accès refusé — DevAfrique{% endblock %}
{% block contenu %}
<section class="section" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="conteneur texte-centre">
        <div class="etat-vide-icone" style="background: var(--couleur-danger-clair); color: var(--couleur-danger);">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9.5 10.5 5 5"/><path d="m14.5 10.5-5 5"/></svg>
        </div>
        <h1 style="font-size: var(--taille-5xl); color: var(--couleur-danger);">403</h1>
        <h2>Accès refusé</h2>
        <p class="texte-secondaire" style="max-width: 45ch; margin: var(--espace-md) auto;">Vous n'avez pas les permissions nécessaires pour accéder à cette page.</p>
        <a href="{% url 'accueil' %}" class="btn btn-primaire btn-lg mt-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Retour à l'accueil
        </a>
    </div>
</section>
{% endblock %}
