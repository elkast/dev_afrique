{% extends 'base.html' %}
{% block titre %}500 — Erreur serveur — DevAfrique{% endblock %}
{% block contenu %}
<section class="section" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="conteneur texte-centre">
        <div class="etat-vide-icone" style="background: var(--couleur-danger-clair); color: var(--couleur-danger);">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        </div>
        <h1 style="font-size: var(--taille-5xl); color: var(--couleur-danger);">500</h1>
        <h2>Erreur interne du serveur</h2>
        <p class="texte-secondaire" style="max-width: 50ch; margin: var(--espace-md) auto;">Quelque chose s'est mal passé de notre côté. Notre équipe a été notifiée. Veuillez réessayer dans quelques instants.</p>
        <a href="{% url 'accueil' %}" class="btn btn-primaire btn-lg mt-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Retour à l'accueil
        </a>
    </div>
</section>
{% endblock %}
