{% extends 'base.html' %}
{% block footer %}{% endblock %}

{% block contenu %}
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-titre">Administration</div>
        <a href="{% url 'tableau_de_bord' %}" class="admin-nav-item {% if request.resolver_match.url_name == 'tableau_de_bord' %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Tableau de bord
        </a>
        <a href="{% url 'admin_liste_parcours' %}" class="admin-nav-item {% if 'parcours' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            Parcours
        </a>
        <a href="{% url 'admin_liste_cours' %}" class="admin-nav-item {% if 'cours' in request.resolver_match.url_name and 'parcours' not in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Cours
        </a>
        <a href="{% url 'admin_liste_lecons' %}" class="admin-nav-item {% if 'lecon' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
            Leçons
        </a>
        <a href="{% url 'admin_liste_projets' %}" class="admin-nav-item {% if 'projet' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>
            Projets
        </a>
        <a href="{% url 'admin_liste_utilisateurs' %}" class="admin-nav-item {% if 'utilisateur' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Utilisateurs
        </a>
        <a href="{% url 'admin_liste_signalements' %}" class="admin-nav-item {% if 'signalement' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>
            Signalements
        </a>
        <a href="{% url 'admin_liste_glossaire' %}" class="admin-nav-item {% if 'glossaire' in request.resolver_match.url_name %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            Glossaire
        </a>
        <div style="padding: var(--espace-sm) var(--espace-lg); margin-top: var(--espace-md);">
            <div class="admin-sidebar-titre">Sécurité</div>
        </div>
        <a href="{% url 'dmz_tableau' %}" class="admin-nav-item {% if 'dmz' in request.path %}actif{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
            DMZ — Sécurité
        </a>
        <div style="padding: var(--espace-lg); border-top: 1px solid var(--fond-sombre-border); margin-top: var(--espace-lg);">
            <a href="{% url 'accueil' %}" class="btn btn-sm btn-outline-light" style="width: 100%; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                Retour au site
            </a>
        </div>
    </aside>
    <div class="admin-contenu">
        {% block contenu_admin %}{% endblock %}
    </div>
</div>
{% endblock %}
